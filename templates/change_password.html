{% extends "base.html" %}
{% block title %}Change Password — Blue Alpha SEO{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm mt-3">
      <div class="card-header py-3">
        <h5 class="mb-0">🔒 Change Password</h5>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('change_password') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Current Password</label>
            <input type="password" name="current_password" class="form-control" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" name="new_password" class="form-control" placeholder="Min. 8 characters" required minlength="8" />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" required minlength="8" />
          </div>
          <button type="submit" class="btn btn-navy w-100 py-2 fw-semibold">
            <i class="bi bi-check-circle me-2"></i>Update Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
