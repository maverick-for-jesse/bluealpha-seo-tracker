{% extends "base.html" %}
{% block title %}Reset Password — Blue Alpha SEO{% endblock %}

{% block content_unauth %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm mt-3">
      <div class="card-header text-center py-4">
        <h4 class="mb-0">🔒 New Password</h4>
        <small class="text-white-50">Blue Alpha SEO Tracker</small>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" name="new_password" class="form-control" placeholder="Min. 8 characters" required autofocus minlength="8" />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required minlength="8" />
          </div>
          <button type="submit" class="btn btn-navy w-100 py-2 fw-semibold">
            <i class="bi bi-check-circle me-2"></i>Reset Password
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3" style="font-size:.8rem">
      <a href="{{ url_for('login') }}" class="text-muted">← Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
