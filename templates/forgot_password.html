{% extends "base.html" %}
{% block title %}Forgot Password — Blue Alpha SEO{% endblock %}

{% block content_unauth %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm mt-3">
      <div class="card-header text-center py-4">
        <h4 class="mb-0">🔑 Reset Password</h4>
        <small class="text-white-50">Blue Alpha SEO Tracker</small>
      </div>
      <div class="card-body p-4">
        <p class="text-muted mb-4" style="font-size:.9rem">Enter your admin email and we'll send a reset link to your WhatsApp.</p>
        <form method="POST" action="{{ url_for('forgot_password') }}">
          <div class="mb-4">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="jesse@bluealpha.us" required autofocus />
          </div>
          <button type="submit" class="btn btn-navy w-100 py-2 fw-semibold">
            <i class="bi bi-send me-2"></i>Send Reset Link
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3" style="font-size:.8rem">
      <a href="{{ url_for('login') }}" class="text-muted">← Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
